<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Готовые промты | Промт-мастер</title>
    <meta name="description" content="Коллекция готовых промтов для Midjourney, ChatGPT, DALL-E и других нейросетей. Копируй и используй сразу!">
    
    <!-- Подключаем общий CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Мета-теги -->
    <meta name="robots" content="index, follow">
    <meta name="author" content="dyshadyshez">
    <meta name="theme-color" content="#4f6af5">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <!-- Дополнительные стили только для этой страницы -->
    <style>
        /* Стили для страницы промтов */
        .library-header {
            text-align: center;
            margin: 1rem 0 2rem 0;
        }
        .library-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .library-header p {
            color: var(--text-muted);
        }
        
        /* Категории */
        .categories-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            justify-content: center;
            margin-bottom: 2rem;
        }
        .category-btn {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 40px;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-secondary);
        }
        .category-btn:hover {
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
        }
        .category-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        
        /* Сетка промтов */
        .prompts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        .prompt-card {
            background: var(--result-bg);
            border: 1px solid var(--input-border);
            border-radius: 24px;
            padding: 1.5rem;
            transition: all 0.3s;
        }
        .prompt-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        .prompt-card-image {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 1rem;
            background: var(--input-bg);
        }
        .prompt-category {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-bottom: 0.8rem;
        }
        .prompt-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        .prompt-description {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            line-height: 1.4;
        }
        .prompt-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1rem;
        }
        .prompt-tag {
            background: var(--input-bg);
            padding: 0.2rem 0.6rem;
            border-radius: 15px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .prompt-text-preview {
            background: var(--input-bg);
            padding: 0.8rem;
            border-radius: 12px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            font-family: monospace;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .prompt-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
        }
        .copy-count {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        .copy-prompt-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            flex: 1;
            margin-left: 0.5rem;
        }
        .copy-prompt-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }
        .error-message {
            text-align: center;
            padding: 2rem;
            color: #e53e3e;
        }
        
        @media (max-width: 700px) {
            .prompts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="shapes" id="parallaxShapes">
        <div class="shape shape1" data-depth="0.4"></div>
        <div class="shape shape2" data-depth="0.7"></div>
        <div class="shape shape3" data-depth="0.2"></div>
        <div class="shape shape4" data-depth="0.9"></div>
        <div class="shape shape5" data-depth="0.5"></div>
    </div>

    <div class="main-panel">
        <div class="header">
            <div style="display: flex; align-items: center;">
                <img src="og-image_v2.png" alt="Промт-мастер" style="height: 80px; width: auto; border-radius: 8px;">
                <span style="font-size: 2rem; font-weight: 500; margin-left: 15px; background: linear-gradient(to right, #4f6af5, #b0c0ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Промт-мастер</span>
            </div>
            
            <!-- НАВИГАЦИЯ -->
            <nav class="main-nav">
                <a href="index.html" class="nav-link">Главная</a>
                <a href="prompts.html" class="nav-link active">Готовые промты</a>
            </nav>
            
            <div class="theme-toggle" id="themeToggle">
                <span>🌙</span>
                <span>Тема</span>
            </div>
        </div>

        <div class="library-header">
            <h1>📚 Готовые промты</h1>
            <p>Выберите категорию и скопируйте промт для своей нейросети</p>
        </div>

        <!-- Категории -->
        <div class="categories-filter" id="categoriesFilter">
            <button class="category-btn active" data-category="all">🎯 Все</button>
            <button class="category-btn" data-category="midjourney">🎨 Midjourney</button>
            <button class="category-btn" data-category="chatgpt">💬 ChatGPT</button>
            <button class="category-btn" data-category="business">💼 Бизнес</button>
            <button class="category-btn" data-category="creative">✨ Креатив</button>
        </div>

        <!-- Сетка промтов -->
        <div class="prompts-grid" id="promptsGrid">
            <div class="loading">Загрузка промтов...</div>
        </div>

        <div class="share-buttons">
            <a href="https://t.me/share/url?url=https://dyshadyshez.github.io/Promt-Changer/&text=Промт-мастер — готовые промты для нейросетей" target="_blank" class="share-btn">Share 📱 Telegram</a>
            <a href="https://vk.com/share.php?url=https://dyshadyshez.github.io/Promt-Changer/" target="_blank" class="share-btn">Share 📘 VK</a>
        </div>

        <div class="footer">
            <a href="https://github.com/dyshadyshez/Promt-Changer" target="_blank">GitHub</a>
            <span>•</span>
            <span>Промт-мастер v2.0</span>
            <span>•</span>
            <span>DyshaDyshez</span>
        </div>
    </div>

    <!-- Подключаем Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
 
    <!-- Специфичный JS для страницы промтов с Supabase (только публичный ключ) -->
    <script>
        // ========== НАСТРОЙКИ SUPABASE ==========
        // Используем ТОЛЬКО публичный (anon) ключ. Секретный ключ НИКОГДА не вставляем в код сайта!
        const SUPABASE_URL = 'https://ligmsihssbvolgdogaqm.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_gC9UkfH2xkJGqGlnIgd-YA_7Ksa09Xb';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Глобальные переменные
        let allPrompts = [];
        let currentCategory = 'all';
        
        // ========== ФУНКЦИИ ==========
        
        // Загрузка промтов из Supabase
        async function loadPromptsFromSupabase() {
            try {
                const { data, error } = await supabase
                    .from('prompts')
                    .select('*')
                    .order('id', { ascending: true });
                
                if (error) throw error;
                
                allPrompts = data || [];
                renderPrompts(currentCategory);
                
                if (allPrompts.length === 0) {
                    document.getElementById('promptsGrid').innerHTML = '<div class="loading">📭 Пока нет промтов. Добавьте их в Supabase!</div>';
                }
                
                return allPrompts;
            } catch (error) {
                console.error('Ошибка загрузки промтов:', error);
                document.getElementById('promptsGrid').innerHTML = '<div class="error-message">❌ Не удалось загрузить промты. Проверьте подключение к Supabase.</div>';
                return [];
            }
        }
        
        // Обновление счётчика копирований
        async function incrementCopyCount(promptId, currentCount) {
            try {
                const { error } = await supabase
                    .from('prompts')
                    .update({ copies: (currentCount || 0) + 1 })
                    .eq('id', promptId);
                
                if (error) throw error;
            } catch (error) {
                console.error('Ошибка обновления счётчика:', error);
            }
        }
        
        // Отрисовка промтов
        function renderPrompts(category = "all") {
            const container = document.getElementById('promptsGrid');
            if (!container) return;
            
            let filtered = allPrompts;
            if (category !== "all") {
                filtered = allPrompts.filter(p => p.category === category);
            }
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="loading">😕 Нет промтов в этой категории</div>';
                return;
            }
            
            container.innerHTML = filtered.map(prompt => {
                const imageUrl = prompt.image_url || '';
                const copies = prompt.copies || 0;
                
                return `
                    <div class="prompt-card" data-id="${prompt.id}">
                        ${imageUrl ? `<img class="prompt-card-image" src="${escapeHtml(imageUrl)}" alt="${escapeHtml(prompt.title)}" loading="lazy">` : ''}
                        <div class="prompt-category">${getCategoryIcon(prompt.category)} ${getCategoryName(prompt.category)}</div>
                        <h3 class="prompt-title">${escapeHtml(prompt.title)}</h3>
                        <p class="prompt-description">${escapeHtml(prompt.description || '')}</p>
                        <div class="prompt-tags">
                            ${prompt.tags ? prompt.tags.map(tag => `<span class="prompt-tag">#${escapeHtml(tag)}</span>`).join('') : ''}
                        </div>
                        <div class="prompt-text-preview" title="${escapeHtml(prompt.prompt)}">
                            ${escapeHtml(prompt.prompt.substring(0, 80))}...
                        </div>
                        <div class="prompt-footer">
                            <span class="copy-count">📋 Копирований: ${copies}</span>
                            <button class="copy-prompt-btn" data-id="${prompt.id}" data-prompt="${escapeHtml(prompt.prompt)}" data-copies="${copies}">
                                📋 Копировать промт
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            
            // Добавляем обработчики копирования
            document.querySelectorAll('.copy-prompt-btn').forEach(btn => {
                btn.addEventListener('click', async function(e) {
                    e.stopPropagation();
                    const promptText = this.getAttribute('data-prompt');
                    const promptId = parseInt(this.getAttribute('data-id'));
                    const currentCopies = parseInt(this.getAttribute('data-copies')) || 0;
                    
                    try {
                        await navigator.clipboard.writeText(promptText);
                        
                        // Обновляем счётчик в Supabase
                        await incrementCopyCount(promptId, currentCopies);
                        
                        // Обновляем локальные данные
                        const promptIndex = allPrompts.findIndex(p => p.id === promptId);
                        if (promptIndex !== -1) {
                            allPrompts[promptIndex].copies = currentCopies + 1;
                        }
                        
                        // Визуальный эффект на кнопке
                        const originalText = this.innerHTML;
                        this.innerHTML = '✅ Скопировано!';
                        setTimeout(() => {
                            this.innerHTML = originalText;
                        }, 1500);
                        
                        // Обновляем счётчик в карточке
                        const copyCountSpan = this.closest('.prompt-card')?.querySelector('.copy-count');
                        if (copyCountSpan) {
                            copyCountSpan.textContent = `📋 Копирований: ${currentCopies + 1}`;
                        }
                        
                    } catch (err) {
                        console.error('Ошибка копирования:', err);
                        alert('Не удалось скопировать текст');
                    }
                });
            });
        }
        
        // Вспомогательные функции
        function getCategoryIcon(categoryId) {
            const icons = {
                midjourney: "🎨",
                chatgpt: "💬",
                business: "💼",
                creative: "✨"
            };
            return icons[categoryId] || "📌";
        }
        
        function getCategoryName(categoryId) {
            const names = {
                midjourney: "Midjourney",
                chatgpt: "ChatGPT",
                business: "Бизнес",
                creative: "Креатив"
            };
            return names[categoryId] || categoryId;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        document.addEventListener('DOMContentLoaded', async () => {
            // Загружаем промты
            await loadPromptsFromSupabase();
            
            // Обработчики категорий
            const categoryBtns = document.querySelectorAll('.category-btn');
            categoryBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    categoryBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.dataset.category;
                    renderPrompts(currentCategory);
                });
            });
        });
    </script>
</body>
</html>
