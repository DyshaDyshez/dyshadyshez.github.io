            },
            creative: {
                title: "✨ Настрой улучшения креатива",
                fields: [
                    { name: "style", label: "Стиль", type: "select", options: ["поэтический", "игровой", "эпический", "минималистичный", "сюрреалистичный"] },
                    { name: "mood", label: "Настроение", type: "select", options: ["радостное", "таинственное", "драматичное", "романтичное", "юмористичное"] },
                    { name: "detail", label: "Детализация", type: "range", min: 1, max: 5, default: 3 },
                    { name: "context", label: "Дополнительный контекст", type: "textarea", placeholder: "Персонажи, локации, ключевые элементы..." }
                ],
                tags: ["история", "сценарий", "поэзия", "персонаж", "мир", "приключение", "фантазия"]
            },
            social: {
                title: "📱 Настрой улучшения для соцсетей",
                fields: [
                    { name: "type", label: "Тип контента", type: "select", options: ["Картинка / Изображение", "Пост / Текст", "Сторис", "Reels / Видео"] },
                    { name: "platform", label: "Платформа", type: "select", options: ["Instagram", "Telegram", "VK", "TikTok", "Twitter"] },
                    { name: "style", label: "Стиль", type: "select", options: ["экспертный", "развлекательный", "вовлекающий", "продающий", "личный"] },
                    { name: "detail", label: "Детализация", type: "range", min: 1, max: 5, default: 3 },
                    { name: "context", label: "Дополнительный контекст", type: "textarea", placeholder: "Тема, целевая аудитория, ключевые хэштеги..." }
                ],
                tags: ["пост", "сторис", "reels", "instagram", "telegram", "vkontakte", "tiktok", "вовлечение"]
            }
        };
        
        const defaultConfig = {
            title: "✨ Настрой улучшения",
            fields: [
                { name: "detail", label: "Детализация", type: "range", min: 1, max: 5, default: 3 },
                { name: "context", label: "Дополнительный контекст", type: "textarea", placeholder: "Что нужно учесть?" }
            ],
            tags: ["улучшить", "детализировать", "оптимизировать"]
        };
        
        // ========== ТЕМА ==========
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
                updateThemeToggleText(savedTheme);
            } else {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const theme = prefersDark ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', theme);
                updateThemeToggleText(theme);
            }
        }
        
        function updateThemeToggleText(theme) {
            const toggle = document.getElementById('themeToggle');
            if (toggle) {
                toggle.innerHTML = theme === 'dark' ? '<span>☀️</span><span>Светлая</span>' : '<span>🌙</span><span>Тёмная</span>';
            }
        }
        
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            updateThemeToggleText(theme);
        }
        
        const themeToggleBtn = document.getElementById('themeToggle');
        if (themeToggleBtn) {
            themeToggleBtn.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme');
                const newTheme = current === 'dark' ? 'light' : 'dark';
                setTheme(newTheme);
            });
        }
        initTheme();
        
        // ========== ФУНКЦИИ РАБОТЫ С ПРОМТАМИ ==========
        async function loadPromptsFromSupabase() {
            try {
                const { data, error } = await supabaseClient
                    .from('prompts')
                    .select('*')
                    .order('id', { ascending: true });
                if (error) throw error;
                allPrompts = data || [];
                renderPrompts(currentCategory);
                if (allPrompts.length === 0) {
                    document.getElementById('promptsGrid').innerHTML = '<div class="loading">📭 Пока нет промтов. Добавьте их в админ-панели!</div>';
                }
                return allPrompts;
            } catch (error) {
                console.error(error);
                document.getElementById('promptsGrid').innerHTML = '<div class="error-message">❌ Не удалось загрузить промты. Проверьте подключение к Supabase.</div>';
                return [];
            }
        }
        
        async function incrementCopyCount(promptId, currentCount) {
            try {
                await supabaseClient
                    .from('prompts')
                    .update({ copies: (currentCount || 0) + 1 })
                    .eq('id', promptId);
            } catch (error) {
                console.error('Ошибка обновления счётчика:', error);
            }
        }
        
        function sortPrompts(prompts, mode) {
            if (mode === 'popular') {
                return [...prompts].sort((a, b) => (b.copies || 0) - (a.copies || 0));
            }
            return [...prompts];
        }
        
        function renderPrompts(category = "all") {
            const container = document.getElementById('promptsGrid');
            if (!container) return;
            
            let filtered = category === "all" ? allPrompts : allPrompts.filter(p => p.category === category);
            filtered = sortPrompts(filtered, sortMode);
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="loading">😕 Нет промтов в этой категории</div>';
                return;
            }
            
            container.innerHTML = filtered.map(prompt => {
                const imageUrl = prompt.image_url || '';
                const copies = prompt.copies || 0;
                
                return `
                    <div class="prompt-card" data-prompt='${JSON.stringify(prompt)}'>
                        ${imageUrl ? `<img class="prompt-card-image" src="${escapeHtml(imageUrl)}" alt="${escapeHtml(prompt.title)}" loading="lazy">` : ''}
                        <div class="prompt-category">${getCategoryIcon(prompt.category)} ${getCategoryName(prompt.category)}</div>
                        <h3 class="prompt-title">${escapeHtml(prompt.title)}</h3>
                        <p class="prompt-description">${escapeHtml(prompt.description || '')}</p>
                        <div class="prompt-tags">${prompt.tags ? prompt.tags.map(tag => `<span class="prompt-tag">#${escapeHtml(tag)}</span>`).join('') : ''}</div>
                        <div class="prompt-text-preview" title="${escapeHtml(prompt.prompt)}">${escapeHtml(prompt.prompt.substring(0, 80))}...</div>
                        <div class="prompt-footer">
                            <span class="copy-count">📋 Копирований: ${copies}</span>
                            <div class="button-group">
                                <button class="copy-prompt-btn" data-id="${prompt.id}" data-prompt="${escapeHtml(prompt.prompt)}" data-copies="${copies}">
                                    📋 Копировать
                                </button>
                                <button class="improve-prompt-btn" data-prompt='${JSON.stringify(prompt)}'>
                                    ✨ Улучшить
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.querySelectorAll('.copy-prompt-btn').forEach(btn => {
                btn.addEventListener('click', async function(e) {
                    e.stopPropagation();
                    const promptText = this.getAttribute('data-prompt');
                    const promptId = parseInt(this.getAttribute('data-id'));
                    const currentCopies = parseInt(this.getAttribute('data-copies')) || 0;
                    await handleCopy(promptText, promptId, currentCopies, this);
                });
            });
            
            document.querySelectorAll('.improve-prompt-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const promptData = JSON.parse(btn.getAttribute('data-prompt'));
                    openImprovePopup(promptData);
                });
            });
            
            document.querySelectorAll('.prompt-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.copy-prompt-btn') || e.target.closest('.improve-prompt-btn')) return;
                    const promptData = JSON.parse(card.dataset.prompt);
                    openModal(promptData);
                });
            });
        }
        
        async function handleCopy(promptText, promptId, currentCopies, buttonElement) {
            try {
                await navigator.clipboard.writeText(promptText);
                await incrementCopyCount(promptId, currentCopies);
                
                const idx = allPrompts.findIndex(p => p.id === promptId);
                if (idx !== -1) allPrompts[idx].copies = currentCopies + 1;
                
                const original = buttonElement.innerHTML;
                buttonElement.innerHTML = '✅ Скопировано!';
                setTimeout(() => { buttonElement.innerHTML = original; }, 1500);
                
                const copySpan = buttonElement.closest('.prompt-card')?.querySelector('.copy-count');
                if (copySpan) copySpan.textContent = `📋 Копирований: ${currentCopies + 1}`;
                
                renderPrompts(currentCategory);
            } catch (err) {
                alert('Не удалось скопировать текст');
            }
        }
        
        // ========== ФУНКЦИЯ УЛУЧШЕНИЯ ==========
        function openImprovePopup(prompt) {
            const config = categoryImproveConfig[prompt.category] || defaultConfig;
            
            const overlay = document.createElement('div');
            overlay.className = 'improve-overlay';
            
            const popup = document.createElement('div');
            popup.className = 'improve-popup';
            
            let fieldsHtml = '';
            config.fields.forEach(field => {
                if (field.type === 'select') {
                    fieldsHtml += `
                        <label style="display: block; margin-bottom: 0.3rem; font-size: 0.75rem;">${field.label}</label>
                        <select id="improve_${field.name}">
                            ${field.options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                        </select>
                    `;
                } else if (field.type === 'range') {
                    const defaultValue = field.default || 3;
                    fieldsHtml += `
                        <label style="display: block; margin-bottom: 0.3rem; font-size: 0.75rem;">${field.label}: <span id="improve_${field.name}_value">${defaultValue}</span></label>
                        <input type="range" id="improve_${field.name}" min="${field.min}" max="${field.max}" value="${defaultValue}" step="1" oninput="document.getElementById('improve_${field.name}_value').textContent = this.value">
                    `;
                } else if (field.type === 'textarea') {
                    fieldsHtml += `
                        <label style="display: block; margin-bottom: 0.3rem; font-size: 0.75rem;">${field.label}</label>
                        <textarea id="improve_${field.name}" rows="2" placeholder="${field.placeholder || ''}"></textarea>
                    `;
                }
            });
            
            const tagsHtml = config.tags ? `
                <div style="margin: 0.8rem 0;">
                    <label style="display: block; margin-bottom: 0.4rem; font-size: 0.75rem;">🏷️ Добавить теги:</label>
                    <div class="tags-cloud" id="tagsCloud">
                        ${config.tags.map(tag => `<span class="suggestion-tag" data-tag="${tag}">#${tag}</span>`).join('')}
                    </div>
                </div>
            ` : '';
            
            popup.innerHTML = `
                <h4>${config.title}</h4>
                <p style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.8rem;">
                    Исходный промт: <strong>${escapeHtml(prompt.title)}</strong>
                </p>
                ${fieldsHtml}
                ${tagsHtml}
                <div class="popup-buttons">
                    <button class="generate-btn" id="generateImprovedBtn">✨ Улучшить</button>
                    <button class="cancel-btn" id="cancelImproveBtn">Отмена</button>
                </div>
                <div id="improvedResult" style="margin-top: 0.8rem;"></div>
            `;
            
            document.body.appendChild(overlay);
            document.body.appendChild(popup);
            
            setTimeout(() => {
                const tags = document.querySelectorAll('.suggestion-tag');
                tags.forEach(tag => {
                    tag.addEventListener('click', () => {
                        const tagText = tag.getAttribute('data-tag');
                        const contextField = document.getElementById('improve_context');
                        if (contextField) {
                            const current = contextField.value;
                            contextField.value = current ? `${current}, ${tagText}` : tagText;
                        }
                    });
                });
            }, 100);
            
            document.getElementById('cancelImproveBtn').onclick = () => {
                overlay.remove();
                popup.remove();
            };
            
            overlay.onclick = () => {
                overlay.remove();
                popup.remove();
            };
            
            document.getElementById('generateImprovedBtn').onclick = () => {
                const values = {};
                config.fields.forEach(field => {
                    const el = document.getElementById(`improve_${field.name}`);
                    if (el) values[field.name] = el.value;
                });
                
                const improvedPrompt = generateImprovedPrompt(prompt, values);
                
                const resultDiv = document.getElementById('improvedResult');
                resultDiv.innerHTML = `
                    <div class="improved-result">
                        <strong>✨ Улучшенный промт:</strong><br>
                        ${escapeHtml(improvedPrompt)}
                        <button class="copy-improved" id="copyImprovedBtn">📋 Копировать</button>
                    </div>
                `;
                
                document.getElementById('copyImprovedBtn').onclick = async () => {
                    await navigator.clipboard.writeText(improvedPrompt);
                    const btn = document.getElementById('copyImprovedBtn');
                    btn.textContent = '✅ Скопировано!';
                    setTimeout(() => { btn.textContent = '📋 Копировать'; }, 1500);
                };
            };
        }
        
        function generateImprovedPrompt(prompt, values) {
            let result = prompt.prompt;
            
            if (values.style) result = `${result}. Style: ${values.style}`;
            if (values.tone) result = `${result}. Tone: ${values.tone}`;
            if (values.aspect) result = `${result} --ar ${values.aspect}`;
            if (values.purpose) result = `${result}. For: ${values.purpose}`;
            if (values.type) result = `${result}. Type: ${values.type}`;
            if (values.platform) result = `${result}. Platform: ${values.platform}`;
            if (values.target) result = `${result}. Target audience: ${values.target}`;
            if (values.complexity) result = `${result}. Complexity: ${values.complexity}`;
            if (values.mood) result = `${result}. Mood: ${values.mood}`;
            if (values.language && values.language !== 'другой') result = `${result}. Language: ${values.language}`;
            
            if (values.detail) {
                const detailLevels = {
                    1: 'minimal detail',
                    2: 'medium detail',
                    3: 'above average detail',
                    4: 'high detail',
                    5: 'maximum detail'
                };
                result = `${result}, ${detailLevels[values.detail] || 'detailed'}`;
            }
            if (values.context) result = `${result}. Additional context: ${values.context}`;
            if (values.length === 'кратко') result = `${result}. Keep it concise.`;
            if (values.length === 'развёрнуто') result = `${result}. Provide detailed explanation.`;
            
            return result;
        }
        
        // ========== МОДАЛЬНОЕ ОКНО ==========
        function openModal(prompt) {
            const existingModal = document.querySelector('.modal');
            if (existingModal) existingModal.remove();
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <span class="close-modal">&times;</span>
                    <h3>📌 ${escapeHtml(prompt.title)}</h3>
                    <div class="prompt-category" style="margin-bottom: 1rem;">${getCategoryIcon(prompt.category)} ${getCategoryName(prompt.category)}</div>
                    ${prompt.image_url ? `<img src="${escapeHtml(prompt.image_url)}" alt="${escapeHtml(prompt.title)}" style="width: 100%; border-radius: 20px; margin-bottom: 1rem; max-height: 250px; object-fit: cover;">` : ''}
                    <p><strong>Описание:</strong> ${escapeHtml(prompt.description || 'Нет описания')}</p>
                    <div class="modal-full-prompt">${escapeHtml(prompt.prompt)}</div>
                    <div class="modal-buttons">
                        <button class="modal-copy" data-prompt="${escapeHtml(prompt.prompt)}" data-id="${prompt.id}" data-copies="${prompt.copies || 0}">📋 Копировать</button>
                        <button class="modal-improve" data-prompt='${JSON.stringify(prompt)}'>✨ Улучшить</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            modal.querySelector('.close-modal').onclick = () => modal.remove();
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
            
            const copyBtn = modal.querySelector('.modal-copy');
            copyBtn.onclick = async () => {
                const text = copyBtn.getAttribute('data-prompt');
                const id = parseInt(copyBtn.getAttribute('data-id'));
                const copies = parseInt(copyBtn.getAttribute('data-copies')) || 0;
                await handleCopy(text, id, copies, copyBtn);
                const original = copyBtn.innerHTML;
                copyBtn.innerHTML = '✅ Скопировано!';
                setTimeout(() => { copyBtn.innerHTML = original; }, 1500);
            };
            
            const improveBtn = modal.querySelector('.modal-improve');
            improveBtn.onclick = () => {
                const promptData = JSON.parse(improveBtn.getAttribute('data-prompt'));
                modal.remove();
                openImprovePopup(promptData);
            };
        }
        
        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        function getCategoryIcon(cat) {
            const icons = {
                photo: "📷", chatgpt: "💬", business: "💼", creative: "✨",
                code: "💻", excel: "📊", video: "🎬", music: "🎵",
                design: "🎨", social: "📱"
            };
            return icons[cat] || "📌";
        }
        
        function getCategoryName(cat) {
            const names = {
                photo: "Фото / Изображения", chatgpt: "ChatGPT / Текст", business: "Бизнес / Маркетинг / SEO",
                creative: "Креатив", code: "Код", excel: "Excel", video: "Видео", music: "Музыка",
                design: "Дизайн", social: "Соцсети"
            };
            return names[cat] || cat;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ========== СОРТИРОВКА ==========
        const sortBtn = document.getElementById('sortByCopiesBtn');
        if (sortBtn) {
            sortBtn.addEventListener('click', () => {
                if (sortMode === 'default') {
                    sortMode = 'popular';
                    sortBtn.innerHTML = '📊 По популярности ↑';
                    sortBtn.classList.add('active');
                } else {
                    sortMode = 'default';
                    sortBtn.innerHTML = '📊 По популярности ↓';
                    sortBtn.classList.remove('active');
                }
                renderPrompts(currentCategory);
            });
        }
        
        // ========== ЗАПУСК ==========
        document.addEventListener('DOMContentLoaded', async () => {
            await loadPromptsFromSupabase();
            
            const categoryBtns = document.querySelectorAll('.category-btn');
            categoryBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    categoryBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.dataset.category;
                    renderPrompts(currentCategory);
                });
            });
        });
    </script>
</body>
</html>
