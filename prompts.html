<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Готовые промты | Промт-мастер</title>
    <meta name="description" content="Коллекция готовых промтов для Midjourney, ChatGPT, DALL-E и других нейросетей. Копируй и используй сразу!">
    
    <!-- Подключаем общий CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Мета-теги (копируем из index.html, но можно оставить базовые) -->
    <meta name="robots" content="index, follow">
    <meta name="author" content="dyshadyshez">
    <meta name="theme-color" content="#4f6af5">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <!-- Дополнительные стили только для этой страницы -->
    <style>
        /* Стили для страницы промтов */
        .library-header {
            text-align: center;
            margin: 1rem 0 2rem 0;
        }
        .library-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .library-header p {
            color: var(--text-muted);
        }
        
        /* Категории */
        .categories-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            justify-content: center;
            margin-bottom: 2rem;
        }
        .category-btn {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 40px;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-secondary);
        }
        .category-btn:hover {
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
        }
        .category-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        
        /* Сетка промтов */
        .prompts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        .prompt-card {
            background: var(--result-bg);
            border: 1px solid var(--input-border);
            border-radius: 24px;
            padding: 1.5rem;
            transition: all 0.3s;
        }
        .prompt-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        .prompt-category {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-bottom: 1rem;
        }
        .prompt-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        .prompt-description {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        .prompt-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1rem;
        }
        .prompt-tag {
            background: var(--input-bg);
            padding: 0.2rem 0.6rem;
            border-radius: 15px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .prompt-text-preview {
            background: var(--input-bg);
            padding: 0.8rem;
            border-radius: 12px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            font-family: monospace;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .copy-prompt-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            font-weight: 500;
            transition: 0.2s;
        }
        .copy-prompt-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }
        
        @media (max-width: 700px) {
            .prompts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="shapes" id="parallaxShapes">
        <div class="shape shape1" data-depth="0.4"></div>
        <div class="shape shape2" data-depth="0.7"></div>
        <div class="shape shape3" data-depth="0.2"></div>
        <div class="shape shape4" data-depth="0.9"></div>
        <div class="shape shape5" data-depth="0.5"></div>
    </div>

    <div class="main-panel">
        <div class="header">
            <div style="display: flex; align-items: center;">
                <img src="og-image_v2.png" alt="Промт-мастер" style="height: 80px; width: auto; border-radius: 8px;">
                <span style="font-size: 2rem; font-weight: 500; margin-left: 15px; background: linear-gradient(to right, #4f6af5, #b0c0ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Промт-мастер</span>
            </div>
            
            <!-- НАВИГАЦИЯ -->
            <nav class="main-nav">
                <a href="index.html" class="nav-link">Главная</a>
                <a href="prompts.html" class="nav-link active">Готовые промты</a>
            </nav>
            
            <div class="theme-toggle" id="themeToggle">
                <span>🌙</span>
                <span>Тема</span>
            </div>
        </div>

        <div class="library-header">
            <h1>📚 Готовые промты</h1>
            <p>Выберите категорию и скопируйте промт для своей нейросети</p>
        </div>

        <!-- Категории -->
        <div class="categories-filter" id="categoriesFilter">
            <button class="category-btn active" data-category="all">🎯 Все</button>
            <button class="category-btn" data-category="midjourney">🎨 Midjourney</button>
            <button class="category-btn" data-category="chatgpt">💬 ChatGPT</button>
            <button class="category-btn" data-category="business">💼 Бизнес</button>
            <button class="category-btn" data-category="creative">✨ Креатив</button>
        </div>

        <!-- Сетка промтов -->
        <div class="prompts-grid" id="promptsGrid">
            <div class="loading">Загрузка промтов...</div>
        </div>

        <div class="share-buttons">
            <a href="https://t.me/share/url?url=https://dyshadyshez.github.io/Promt-Changer/&text=Промт-мастер — готовые промты для нейросетей" target="_blank" class="share-btn">Share 📱 Telegram</a>
            <a href="https://vk.com/share.php?url=https://dyshadyshez.github.io/Promt-Changer/" target="_blank" class="share-btn">Share 📘 VK</a>
        </div>

        <div class="footer">
            <a href="https://github.com/dyshadyshez/Promt-Changer" target="_blank">GitHub</a>
            <span>•</span>
            <span>Промт-мастер v2.0</span>
            <span>•</span>
            <span>DyshaDyshez</span>
        </div>
    </div>

    <!-- Подключаем общий JS -->
    <script src="js/script.js"></script>
    
    <!-- Специфичный JS для страницы промтов -->
    <script>
        // Данные промтов
        const promptsData = [
            {
                id: 1,
                title: "Киберпанк портрет",
                category: "midjourney",
                prompt: "cyberpunk portrait, neon lights, futuristic city background, detailed face, 8k, ultra realistic, cinematic lighting --ar 16:9 --stylize 250",
                description: "Стильный портрет в киберпанк стиле с неоновой подсветкой",
                tags: ["портрет", "киберпанк", "неон"]
            },
            {
                id: 2,
                title: "Фэнтези пейзаж",
                category: "midjourney",
                prompt: "fantasy landscape, magical forest, glowing mushrooms, ancient ruins, misty mountains, golden hour, 8k, detailed --ar 16:9",
                description: "Волшебный фэнтезийный пейзаж с детальной проработкой",
                tags: ["пейзаж", "фэнтези", "лес"]
            },
            {
                id: 3,
                title: "Бизнес-письмо клиенту",
                category: "chatgpt",
                prompt: "Напиши профессиональное письмо клиенту, который задерживает оплату. Тон: вежливый, но настойчивый. Включи: напоминание о сроке, сумму задолженности, предложение связаться для уточнения.",
                description: "Шаблон для деловой переписки",
                tags: ["бизнес", "письмо", "клиенты"]
            },
            {
                id: 4,
                title: "Пост для Instagram",
                category: "chatgpt",
                prompt: "Напиши вовлекающий пост для Instagram на тему [тема]. Включи: цепляющий заголовок, 3 полезных совета, вопрос к аудитории, 5 релевантных хэштегов. Тон: дружелюбный, экспертный.",
                description: "Универсальный шаблон для соцсетей",
                tags: ["соцсети", "маркетинг", "контент"]
            },
            {
                id: 5,
                title: "Коммерческое предложение",
                category: "business",
                prompt: "Создай коммерческое предложение для [услуга/продукт]. Структура: 1) Проблема клиента, 2) Наше решение, 3) Преимущества, 4) Условия и цены, 5) Призыв к действию.",
                description: "Шаблон эффективного коммерческого предложения",
                tags: ["продажи", "КП", "клиенты"]
            },
            {
                id: 6,
                title: "Сценарий видео",
                category: "creative",
                prompt: "Напиши сценарий для 60-секундного видео на тему [тема]. Структура: 0-5 сек — хук, 5-30 сек — проблема, 30-50 сек — решение, 50-60 сек — призыв к действию.",
                description: "Шаблон для создания видео-контента",
                tags: ["видео", "сценарий", "контент"]
            },
            {
                id: 7,
                title: "Минималистичный логотип",
                category: "midjourney",
                prompt: "minimalist logo design, abstract geometric shape, clean lines, modern, white background, vector style, simple --no text --ar 1:1",
                description: "Современный минималистичный логотип",
                tags: ["логотип", "минимализм", "дизайн"]
            },
            {
                id: 8,
                title: "План продаж",
                category: "business",
                prompt: "Разработай план продаж на квартал. Включи: анализ текущей ситуации, цели по выручке, этапы воронки продаж, KPI для отдела, план действий на каждый месяц.",
                description: "Структурированный план продаж",
                tags: ["продажи", "план", "бизнес"]
            },
            {
                id: 9,
                title: "Идеи для блога",
                category: "creative",
                prompt: "Сгенерируй 20 идей для блога на тему [тема]. Идеи должны быть разных форматов: списки, гайды, личные истории, интервью, обзоры, кейсы, лайфхаки.",
                description: "Генератор идей для контента",
                tags: ["блог", "контент", "идеи"]
            },
            {
                id: 10,
                title: "React компонент",
                category: "chatgpt",
                prompt: "Создай React компонент [название] с TypeScript. Компонент должен: принимать пропсы, иметь внутреннее состояние, обрабатывать события, включать CSS модули.",
                description: "Шаблон для React разработки",
                tags: ["react", "typescript", "фронтенд"]
            }
        ];

        // Функция отрисовки промтов
        function renderPrompts(category = "all") {
            const container = document.getElementById('promptsGrid');
            if (!container) return;
            
            let filtered = promptsData;
            if (category !== "all") {
                filtered = promptsData.filter(p => p.category === category);
            }
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="loading">😕 Нет промтов в этой категории</div>';
                return;
            }
            
            container.innerHTML = filtered.map(prompt => `
                <div class="prompt-card">
                    <div class="prompt-category">${getCategoryName(prompt.category)}</div>
                    <h3 class="prompt-title">${escapeHtml(prompt.title)}</h3>
                    <p class="prompt-description">${escapeHtml(prompt.description)}</p>
                    <div class="prompt-tags">
                        ${prompt.tags.map(tag => `<span class="prompt-tag">#${escapeHtml(tag)}</span>`).join('')}
                    </div>
                    <div class="prompt-text-preview" title="${escapeHtml(prompt.prompt)}">
                        ${escapeHtml(prompt.prompt.substring(0, 80))}...
                    </div>
                    <button class="copy-prompt-btn" data-prompt="${escapeHtml(prompt.prompt)}">📋 Копировать промт</button>
                </div>
            `).join('');
            
            // Добавляем обработчики копирования
            document.querySelectorAll('.copy-prompt-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const promptText = this.getAttribute('data-prompt');
                    navigator.clipboard.writeText(promptText).then(() => {
                        const originalText = this.innerHTML;
                        this.innerHTML = '✅ Скопировано!';
                        setTimeout(() => {
                            this.innerHTML = originalText;
                        }, 1500);
                    }).catch(() => alert('Не удалось скопировать'));
                });
            });
        }
        
        function getCategoryName(categoryId) {
            const categories = {
                midjourney: "🎨 Midjourney",
                chatgpt: "💬 ChatGPT",
                business: "💼 Бизнес",
                creative: "✨ Креатив"
            };
            return categories[categoryId] || categoryId;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', () => {
            renderPrompts("all");
            
            // Обработчики категорий
            const categoryBtns = document.querySelectorAll('.category-btn');
            categoryBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    categoryBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderPrompts(btn.dataset.category);
                });
            });
        });
    </script>
</body>
</html>
