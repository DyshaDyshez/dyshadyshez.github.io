<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Промт-мастер</title>
    
    <!-- Подключаем общий CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* Дополнительные стили для админки */
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .admin-title {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(to right, var(--accent), #b0c0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logout-btn {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: 0.2s;
        }
        
        .logout-btn:hover {
            background: #e53e3e;
            color: white;
            border-color: #e53e3e;
        }
        
        /* Статистика */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--result-bg);
            border: 1px solid var(--input-border);
            border-radius: 20px;
            padding: 1.2rem;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
        }
        
        /* Панель управления */
        .admin-panel {
            background: var(--result-bg);
            border: 1px solid var(--input-border);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .add-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .add-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }
        
        /* Таблица промтов */
        .prompts-table {
            width: 100%;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 0.8rem;
            text-align: left;
            border-bottom: 1px solid var(--input-border);
        }
        
        th {
            color: var(--accent);
            font-weight: 600;
        }
        
        .prompt-preview {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }
        
        .edit-btn, .delete-btn, .duplicate-btn {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 20px;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        
        .edit-btn:hover {
            background: var(--accent);
            color: white;
        }
        
        .delete-btn:hover {
            background: #e53e3e;
            color: white;
        }
        
        .duplicate-btn:hover {
            background: #38a169;
            color: white;
        }
        
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--input-border);
        }
        
        .modal-content h3 {
            margin-bottom: 1.5rem;
        }
        
        .modal-content input,
        .modal-content textarea,
        .modal-content select {
            width: 100%;
            margin-bottom: 1rem;
            padding: 0.8rem;
            border-radius: 12px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
        }
        
        .modal-content textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .save-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 40px;
            cursor: pointer;
            flex: 1;
        }
        
        .cancel-btn {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            padding: 0.8rem;
            border-radius: 40px;
            cursor: pointer;
            flex: 1;
        }
        
        .tags-input {
            margin-bottom: 1rem;
        }
        
        .tags-input input {
            margin-bottom: 0.5rem;
        }
        
        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            margin-top: 0.5rem;
        }
        
        .tag-item {
            background: var(--accent);
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 15px;
            font-size: 0.7rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        .remove-tag {
            cursor: pointer;
            font-weight: bold;
        }
        
        .image-preview {
            max-width: 100%;
            max-height: 150px;
            margin-top: 0.5rem;
            border-radius: 12px;
        }
        
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-box {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--input-border);
        }
        
        .login-box h2 {
            margin-bottom: 1.5rem;
            text-align: center;
        }
        
        .login-box input {
            width: 100%;
            margin-bottom: 1rem;
            padding: 0.8rem;
            border-radius: 40px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
        }
        
        .login-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 40px;
            cursor: pointer;
        }
        
        .error-msg {
            color: #e53e3e;
            text-align: center;
            margin-top: 1rem;
        }
        
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: white;
            padding: 0.8rem 1.2rem;
            border-radius: 40px;
            z-index: 1100;
        }
        
        @media (max-width: 700px) {
            .admin-container {
                padding: 1rem;
            }
            th, td {
                padding: 0.5rem;
                font-size: 0.8rem;
            }
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/admin.js"></script>
</body>
</html>
