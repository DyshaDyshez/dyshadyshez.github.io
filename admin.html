<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель</title>
    <style>
        body {
            font-family: system-ui;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .error { color: red; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 Вход в админку</h2>
        <input type="password" id="password" placeholder="Введите пароль">
        <button onclick="login()">Войти</button>
        <div id="error" class="error"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ligmsihssbvolgdogaqm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_gC9UkfH2xkJGqGlnIgd-YA_7Ksa09Xb';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function login() {
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            
            try {
                const { data, error } = await supabase.rpc('check_admin_password', {
                    input_password: password
                });
                
                if (error) throw error;
                
                if (data === true) {
                    localStorage.setItem('admin_logged_in', 'true');
                    localStorage.setItem('admin_login_time', Date.now().toString());
                    alert('Вход выполнен!');
                    // Здесь можно перенаправить на полную админку
                    location.reload();
                } else {
                    errorDiv.textContent = 'Неверный пароль';
                }
            } catch (err) {
                console.error(err);
                errorDiv.textContent = 'Ошибка подключения';
            }
        }
        
        // Проверяем, может уже авторизован
        const isLoggedIn = localStorage.getItem('admin_logged_in');
        if (isLoggedIn === 'true') {
            document.querySelector('.login-box').innerHTML = '<h2>✅ Вы авторизованы</h2><p>Загружается админ-панель...</p>';
            // Здесь можно подгрузить полную админку
        }
    </script>
</body>
</html>
