<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Промт-мастер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        
        :root {
            --bg-gradient-start: #f0f4ff;
            --bg-gradient-end: #d9e2f0;
            --panel-bg: rgba(255, 255, 255, 0.7);
            --panel-border: rgba(0, 0, 0, 0.1);
            --text-primary: #1a1f2e;
            --text-secondary: #2d3748;
            --text-muted: #4a5568;
            --accent: #4f6af5;
            --input-bg: rgba(255, 255, 255, 0.9);
            --input-border: #cbd5e0;
        }
        
        [data-theme="dark"] {
            --bg-gradient-start: #1a1f2e;
            --bg-gradient-end: #0b0d17;
            --panel-bg: rgba(20, 25, 40, 0.7);
            --panel-border: rgba(255, 255, 255, 0.1);
            --text-primary: #eef2ff;
            --text-secondary: #cbd5ff;
            --text-muted: #9aa4c8;
            --accent: #4f6af5;
            --input-bg: rgba(12, 16, 28, 0.7);
            --input-border: #2f3750;
        }
        
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 20%, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            transition: background 0.3s;
        }
        
        .login-container, .admin-container {
            width: 100%;
            max-width: 1200px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--panel-border);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.5);
        }
        
        .login-box {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }
        
        .login-box h2 {
            margin-bottom: 1.5rem;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border-radius: 40px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
        }
        
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .error-msg {
            color: #e53e3e;
            margin-top: 1rem;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--input-bg);
            border-radius: 20px;
            padding: 1rem;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .prompts-table {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 0.8rem;
            text-align: left;
            border-bottom: 1px solid var(--input-border);
        }
        
        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }
        
        .edit-btn, .delete-btn, .duplicate-btn {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 20px;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
        }
        
        .edit-btn:hover { background: var(--accent); color: white; }
        .delete-btn:hover { background: #e53e3e; color: white; }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: white;
            padding: 0.8rem 1.2rem;
            border-radius: 40px;
            z-index: 1100;
        }
        
        .theme-toggle {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 40px;
            padding: 0.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ========== НАСТРОЙКИ ==========
        const SUPABASE_URL = 'https://ligmsihssbvolgdogaqm.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_gC9UkfH2xkJGqGlnIgd-YA_7Ksa09Xb';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // ========== ТЕМА ==========
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            } else {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
            }
        }
        initTheme();
        
        // ========== СОСТОЯНИЕ ==========
        let allPrompts = [];
        let editingPrompt = null;
        
        // ========== ВСПОМОГАТЕЛЬНЫЕ ==========
        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            toast.style.background = isError ? '#e53e3e' : '#4f6af5';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ========== АВТОРИЗАЦИЯ ==========
        async function checkAuth() {
            const isLoggedIn = localStorage.getItem('admin_logged_in');
            const loginTime = localStorage.getItem('admin_login_time');
            if (isLoggedIn === 'true' && loginTime) {
                const hoursPassed = (Date.now() - parseInt(loginTime)) / (1000 * 60 * 60);
                if (hoursPassed < 24) return true;
            }
            return false;
        }
        
        async function login(password) {
            try {
                const { data, error } = await supabase.rpc('check_admin_password', {
                    input_password: password
                });
                if (error) throw error;
                if (data === true) {
                    localStorage.setItem('admin_logged_in', 'true');
                    localStorage.setItem('admin_login_time', Date.now().toString());
                    showToast('✅ Вход выполнен!');
                    return true;
                } else {
                    showToast('❌ Неверный пароль', true);
                    return false;
                }
            } catch (error) {
                console.error(error);
                showToast('❌ Ошибка подключения', true);
                return false;
            }
        }
        
        function logout() {
            localStorage.removeItem('admin_logged_in');
            localStorage.removeItem('admin_login_time');
            showToast('👋 Выход выполнен');
            renderLoginPage();
        }
        
        // ========== ЗАГРУЗКА ПРОМТОВ ==========
        async function loadPrompts() {
            try {
                const { data, error } = await supabase
                    .from('prompts')
                    .select('*')
                    .order('id', { ascending: false });
                if (error) throw error;
                allPrompts = data || [];
                renderAdminPanel();
                return allPrompts;
            } catch (error) {
                console.error(error);
                showToast('❌ Ошибка загрузки', true);
                return [];
            }
        }
        
        async function getStats() {
            const totalCopies = allPrompts.reduce((sum, p) => sum + (p.copies || 0), 0);
            return {
                total: allPrompts.length,
                totalCopies: totalCopies,
                avgCopies: allPrompts.length ? (totalCopies / allPrompts.length).toFixed(1) : 0
            };
        }
        
        // ========== CRUD ==========
        async function savePrompt(promptData, isEdit = false) {
            try {
                let result;
                if (isEdit && editingPrompt) {
                    result = await supabase
                        .from('prompts')
                        .update({
                            title: promptData.title,
                            category: promptData.category,
                            prompt: promptData.prompt,
                            description: promptData.description,
                            tags: promptData.tags,
                            image_url: promptData.image_url
                        })
                        .eq('id', editingPrompt.id);
                } else {
                    result = await supabase
                        .from('prompts')
                        .insert([{
                            title: promptData.title,
                            category: promptData.category,
                            prompt: promptData.prompt,
                            description: promptData.description,
                            tags: promptData.tags,
                            image_url: promptData.image_url,
                            copies: 0
                        }]);
                }
                if (result.error) throw result.error;
                showToast(isEdit ? '✅ Обновлён!' : '✅ Добавлен!');
                closeModal();
                await loadPrompts();
            } catch (error) {
                console.error(error);
                showToast('❌ Ошибка сохранения', true);
            }
        }
        
        async function deletePrompt(id) {
            if (!confirm('Удалить промт?')) return;
            try {
                const { error } = await supabase.from('prompts').delete().eq('id', id);
                if (error) throw error;
                showToast('🗑️ Удалён');
                await loadPrompts();
            } catch (error) {
                showToast('❌ Ошибка удаления', true);
            }
        }
        
        async function duplicatePrompt(prompt) {
            try {
                const { error } = await supabase.from('prompts').insert([{
                    title: `${prompt.title} (копия)`,
                    category: prompt.category,
                    prompt: prompt.prompt,
                    description: prompt.description,
                    tags: prompt.tags,
                    image_url: prompt.image_url,
                    copies: 0
                }]);
                if (error) throw error;
                showToast('📋 Скопирован!');
                await loadPrompts();
            } catch (error) {
                showToast('❌ Ошибка копирования', true);
            }
        }
        
        // ========== РЕНДЕРИНГ ==========
        function renderLoginPage() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="login-container">
                    <div class="login-box">
                        <h2>🔐 Админ-панель</h2>
                        <input type="password" id="adminPassword" placeholder="Введите пароль">
                        <button id="loginBtn">Войти</button>
                        <div id="loginError" class="error-msg"></div>
                    </div>
                </div>
            `;
            document.getElementById('loginBtn').onclick = async () => {
                const pwd = document.getElementById('adminPassword').value;
                const ok = await login(pwd);
                if (ok) await loadPrompts();
            };
            document.getElementById('adminPassword').onkeypress = (e) => {
                if (e.key === 'Enter') document.getElementById('loginBtn').click();
            };
        }
        
        async function renderAdminPanel() {
            const stats = await getStats();
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="admin-container">
                    <div class="admin-header">
                        <h2>⚡ Админ-панель</h2>
                        <button id="logoutBtn" class="theme-toggle">🚪 Выйти</button>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-value">${stats.total}</div><div>Промтов</div></div>
                        <div class="stat-card"><div class="stat-value">${stats.totalCopies}</div><div>Копирований</div></div>
                        <div class="stat-card"><div class="stat-value">${stats.avgCopies}</div><div>Среднее</div></div>
                    </div>
                    
                    <div style="margin-bottom: 1rem;">
                        <button id="addBtn">+ Добавить промт</button>
                    </div>
                    
                    <div class="prompts-table">
                        ${allPrompts.length === 0 ? '<p>Нет промтов</p>' : `
                            <table>
                                <thead><tr><th>ID</th><th>Название</th><th>Категория</th><th>Промт</th><th>Копий</th><th>Действия</th></tr></thead>
                                <tbody>
                                    ${allPrompts.map(p => `
                                        <tr>
                                            <td>${p.id}</td>
                                            <td><strong>${escapeHtml(p.title)}</strong></td>
                                            <td>${p.category}</td>
                                            <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${escapeHtml(p.prompt)}">${escapeHtml(p.prompt.substring(0, 50))}...</td>
                                            <td>${p.copies || 0}</td>
                                            <td class="action-buttons">
                                                <button class="edit-btn" data-id="${p.id}">✏️</button>
                                                <button class="duplicate-btn" data-id="${p.id}">📋</button>
                                                <button class="delete-btn" data-id="${p.id}">🗑️</button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        `}
                    </div>
                </div>
            `;
            
            document.getElementById('logoutBtn').onclick = logout;
            document.getElementById('addBtn').onclick = () => openModal();
            
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.onclick = () => {
                    const id = parseInt(btn.dataset.id);
                    const prompt = allPrompts.find(p => p.id === id);
                    if (prompt) openModal(prompt);
                };
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.onclick = () => deletePrompt(parseInt(btn.dataset.id));
            });
            document.querySelectorAll('.duplicate-btn').forEach(btn => {
                btn.onclick = () => {
                    const id = parseInt(btn.dataset.id);
                    const prompt = allPrompts.find(p => p.id === id);
                    if (prompt) duplicatePrompt(prompt);
                };
            });
        }
        
        function openModal(prompt = null) {
            editingPrompt = prompt;
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>${prompt ? '✏️ Редактировать' : '➕ Новый промт'}</h3>
                    <input type="text" id="promptTitle" placeholder="Название" value="${escapeHtml(prompt?.title || '')}">
                    <select id="promptCategory">
                        <option value="midjourney" ${prompt?.category === 'midjourney' ? 'selected' : ''}>Midjourney</option>
                        <option value="chatgpt" ${prompt?.category === 'chatgpt' ? 'selected' : ''}>ChatGPT</option>
                        <option value="business" ${prompt?.category === 'business' ? 'selected' : ''}>Бизнес</option>
                        <option value="creative" ${prompt?.category === 'creative' ? 'selected' : ''}>Креатив</option>
                    </select>
                    <textarea id="promptDescription" rows="2" placeholder="Описание">${escapeHtml(prompt?.description || '')}</textarea>
                    <textarea id="promptText" rows="4" placeholder="Текст промта">${escapeHtml(prompt?.prompt || '')}</textarea>
                    <input type="text" id="promptTags" placeholder="Теги (через запятую)" value="${prompt?.tags ? prompt.tags.join(', ') : ''}">
                    <input type="text" id="promptImage" placeholder="Ссылка на картинку" value="${escapeHtml(prompt?.image_url || '')}">
                    <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                        <button id="saveBtn">💾 Сохранить</button>
                        <button id="cancelBtn">Отмена</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById('saveBtn').onclick = async () => {
                const title = document.getElementById('promptTitle').value.trim();
                const promptText = document.getElementById('promptText').value.trim();
                if (!title || !promptText) {
                    showToast('❌ Заполните название и текст', true);
                    return;
                }
                const tagsStr = document.getElementById('promptTags').value;
                const tags = tagsStr ? tagsStr.split(',').map(t => t.trim()).filter(t => t) : [];
                await savePrompt({
                    title,
                    category: document.getElementById('promptCategory').value,
                    description: document.getElementById('promptDescription').value.trim(),
                    prompt: promptText,
                    tags: tags,
                    image_url: document.getElementById('promptImage').value.trim() || null
                }, !!prompt);
            };
            document.getElementById('cancelBtn').onclick = closeModal;
            modal.onclick = (e) => { if (e.target === modal) closeModal(); };
        }
        
        function closeModal() {
            const modal = document.querySelector('.modal');
            if (modal) modal.remove();
            editingPrompt = null;
        }
        
        // ========== ЗАПУСК ==========
        (async function init() {
            const isLoggedIn = await checkAuth();
            if (isLoggedIn) {
                await loadPrompts();
            } else {
                renderLoginPage();
            }
        })();
    </script>
</body>
</html>
